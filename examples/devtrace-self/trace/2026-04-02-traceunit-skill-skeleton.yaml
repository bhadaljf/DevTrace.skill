summary: Skill 版已从“聊天整理说明”升级为“分割系统骨架”，完成了 TraceUnit schema、index/current 模板、session loader 和回写规则的落地。
details: |
  这一版已经具备规则层能力：
  1. 定义标准化 `TraceUnit`
  2. 明确 `00_INDEX.md` 与 `01_CURRENT.md` 的职责
  3. 明确新 AI session 如何自动加载上下文
  4. 明确当前会话结束后如何回写新进展
  目前仍缺最小脚本层，尚未自动把原始材料转成 TraceUnit。
