summary: 在对 Web 版 DevTrace 的旧实现复盘后，确认 DevTrace 的核心应重新回到“分割”，而不是停留在聊天整理、日报或简单索引层。
details: |
  讨论中明确区分了 Web 版和 Skill 版的边界：
  Web 版受聊天记录输入限制，更适合作为轻量实现；
  Skill 版可接收更丰富的项目材料，因此可以承担更健壮的分割系统实现。
  这一步本质上是 DevTrace 架构定位的纠偏。
evidence:
  - Web 版已有 `segment.py`，说明 DevTrace 原本就有“先分割，再理解”的内核
  - 新讨论中明确否定了“只做日报/索引”的方向

